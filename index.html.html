<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_4');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;
varying vec2 v_texCoord;

void main() {
    vec2 uv = v_texCoord;
    
    // Slow, organic movement
    float t = u_time * 0.2;
    
    // Create multiple color blobs
    vec3 color1 = vec3(0.38, 0.4, 0.94); // Primary (Indigo)
    vec3 color2 = vec3(0.06, 0.8, 0.47); // Success (Emerald)
    vec3 color3 = vec3(0.96, 0.3, 0.4); // Danger (Rose)
    vec3 color4 = vec3(1.0, 0.8, 0.2); // Warning (Amber)
    
    float n1 = sin(uv.x * 3.0 + t) * cos(uv.y * 2.0 + t);
    float n2 = sin(uv.y * 4.0 - t * 0.5) * cos(uv.x * 2.0 + t * 0.3);
    float n3 = sin(length(uv - 0.5) * 5.0 + t);
    
    vec3 finalColor = mix(color1, color2, n1 * 0.5 + 0.5);
    finalColor = mix(finalColor, color3, n2 * 0.5 + 0.5);
    finalColor = mix(finalColor, color4, n3 * 0.3 + 0.3);
    
    // Desaturate and brighten for a "soft" feel
    finalColor = mix(finalColor, vec3(1.0), 0.4);
    
    gl_FragColor = vec4(finalColor, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();

<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full mx-auto mb-lg"></div>
<h3 class="font-headline-md text-headline-md mb-md">Quick Log</h3>
<div class="grid grid-cols-4 gap-md mb-xl">
<button class="text-4xl" onclick="logMood('Happy', '😀')">😀</button>
<button class="text-4xl" onclick="logMood('Good', '😊')">😊</button>
<button class="text-4xl" onclick="logMood('Neutral', '😐')">😐</button>
<button class="text-4xl" onclick="logMood('Loved', '❤️')">❤️</button>
</div>

<script>
        // State Management
        let logs = JSON.parse(localStorage.getItem('moodLogs')) || [];
        let moodChartInstance = null;

        const navItems = ['home', 'stats', 'history', 'settings'];
        const sections = {
            home: document.getElementById('section-home'),
            stats: document.getElementById('section-stats'),
            history: document.getElementById('section-history'),
            settings: document.getElementById('section-settings')
        };

        const activeClass = "flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim bg-primary/10 rounded-xl p-2";
        const inactiveClass = "flex flex-col items-center justify-center text-outline dark:text-outline-variant p-2";

        // Navigation Logic
        function navigateTo(target) {
            navItems.forEach(item => {
                const navBtn = document.getElementById(`nav-${item}`);
                if (item === target) {
                    navBtn.className = activeClass;
                    sections[item].classList.remove('hidden-section');
                    sections[item].style.display = 'block';
                    setTimeout(() => sections[item].style.opacity = '1', 10);
                } else {
                    navBtn.className = inactiveClass;
                    sections[item].style.opacity = '0';
                    setTimeout(() => {
                        sections[item].classList.add('hidden-section');
                        sections[item].style.display = 'none';
                    }, 300);
                }
            });

            if (target === 'stats') renderStats();
            if (target === 'history') renderHistory();
        }

        // Mood Logging Logic
        function logMood(label, emoji, color) {
            const entry = {
                id: Date.now(),
                label,
                emoji,
                color,
                timestamp: new Date().toISOString()
            };
            logs.unshift(entry);
            localStorage.setItem('moodLogs', JSON.stringify(logs));
            
            showMotivation(label);
            closeMoodModal();
            updateAtmosphere(color);
        }

        function showMotivation(label) {
            const box = document.getElementById('motivation-box');
            const text = document.getElementById('motivation-text');
            const messages = {
                Happy: "Keep that smile shining! You're doing great.",
                Good: "Sounds like a wonderful day. Enjoy every moment.",
                Neutral: "It's okay to just be. Peace is productive.",
                Sad: "Take your time. Better days are ahead.",
                Angry: "Deep breaths. This too shall pass.",
                Tired: "Rest is just as important as work. Be kind to yourself.",
                Stressed: "One small step at a time. You've got this.",
                Loved: "Gratitude grows when it's shared. Pass it on!"
            };
            
            text.innerText = messages[label] || "Mood logged successfully!";
            box.classList.remove('hidden', 'opacity-0');
            setTimeout(() => {
                box.classList.add('opacity-0');
                setTimeout(() => box.classList.add('hidden'), 500);
            }, 4000);
        }

        function updateAtmosphere(color) {
            if (color) {
                // Apply a subtle tint to the page background transition
                document.body.style.backgroundColor = `${color}15`; // 15 is hex for low opacity
            }
        }

        // Stats Logic
        function renderStats() {
            const ctx = document.getElementById('moodChart').getContext('2d');
            
            if (moodChartInstance) moodChartInstance.destroy();

            const last7Days = logs.slice(0, 10).reverse();
            const labels = last7Days.map(l => new Date(l.timestamp).toLocaleDateString([], { weekday: 'short' }));
            const data = last7Days.map(l => {
                const map = { Happy: 5, Good: 4, Neutral: 3, Sad: 2, Angry: 1, Tired: 1, Stressed: 1, Loved: 5 };
                return map[l.label] || 3;
            });

            moodChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Mood Level',
                        data: data,
                        borderColor: '#4648d4',
                        backgroundColor: 'rgba(70, 72, 212, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: '#4648d4'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 1, max: 5, grid: { display: false }, ticks: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Summary stats
            const counts = {};
            logs.forEach(l => counts[l.label] = (counts[l.label] || 0) + 1);
            const mostSelected = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, "--");
            document.getElementById('stat-most-selected').innerText = mostSelected !== "--" ? mostSelected : "--";

            // Basic streak calculation
            document.getElementById('stat-streak').innerText = logs.length > 0 ? "1" : "0"; // Placeholder logic
        }

        // History Logic
        function renderHistory(query = '') {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            const filtered = logs.filter(l => l.label.toLowerCase().includes(query.toLowerCase()));
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="glass-card p-lg rounded-xl text-center text-outline">No logs found yet.</div>';
                return;
            }

            filtered.forEach(entry => {
                const date = new Date(entry.timestamp);
                const el = document.createElement('div');
                el.className = 'glass-card p-md rounded-xl flex items-center justify-between group';
                el.innerHTML = `
                    <div class="flex items-center gap-md">
                        <span class="text-3xl">${entry.emoji}</span>
                        <div>
                            <p class="font-label-md">${entry.label}</p>
                            <p class="text-outline text-label-sm">${date.toLocaleDateString()} at ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>
                    <button onclick="deleteEntry(${entry.id})" class="text-error opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                `;
                list.appendChild(el);
            });
        }

        function deleteEntry(id) {
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('moodLogs', JSON.stringify(logs));
            renderHistory();
        }

        function exportHistory() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(logs));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "mood_history.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const icon = document.querySelector('#theme-toggle span');
            icon.innerText = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
        });

        // Modal Logic
        function openMoodModal() { document.getElementById('mood-modal').classList.remove('hidden'); }
        function closeMoodModal() { document.getElementById('mood-modal').classList.add('hidden'); }

        // Settings Logic
        function resetData() {
            if (confirm("Are you sure you want to delete all your mood history? This cannot be undone.")) {
                logs = [];
                localStorage.setItem('moodLogs', JSON.stringify(logs));
                navigateTo('home');
            }
        }

        document.getElementById('animation-toggle').addEventListener('change', (e) => {
            const shader = document.querySelector('webgl-shader');
            shader.style.display = e.target.checked ? 'block' : 'none';
        });

        document.getElementById('history-search').addEventListener('input', (e) => {
            renderHistory(e.target.value);
        });

        // Initialize
        navigateTo('home');
    </script>
<style>
        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slide-up 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</body></html>
